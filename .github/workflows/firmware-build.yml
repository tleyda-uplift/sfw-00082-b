name: Firmware Build

on:
  push:
    tags: ["FW_v*.*.*"]
  workflow_dispatch:

env:
  MSP430_GCC_VERSION: 9.3.1.11
  MSP430_SUPPORT_VERSION: 1.212

jobs:
  build:
    name: Build MSP430 Firmware
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install MSP430-GCC compiler
        run: |
          mkdir -p ~/msp430-gcc
          tar -xf sfw-00082/gcc/toolchain/msp430-gcc-${{ env.MSP430_GCC_VERSION }}_linux64.tar.bz2 --strip-components=1 -C ~/msp430-gcc

      - name: Install MSP430-GCC support files
        run: |
          unzip -q sfw-00082/gcc/toolchain/msp430-gcc-support-files-${{ env.MSP430_SUPPORT_VERSION }}.zip -d ~

      - name: Add toolchain to PATH
        run: echo "$HOME/msp430-gcc/bin" >> $GITHUB_PATH

      - name: Build firmware
        run: make -C sfw-00082/gcc SUPPORT_FILE_DIR=$HOME/msp430-gcc-support-files/include

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            sfw-00082/gcc/gcc-build/sfw-00082.elf
            sfw-00082/gcc/gcc-build/sfw-00082.hex
