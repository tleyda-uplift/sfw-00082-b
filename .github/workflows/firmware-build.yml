name: Firmware Build

on:
  push:
    tags: ["FW_v*.*.*"]

env:
  MSP430_GCC_VERSION: 9.3.1.11
  MSP430_SUPPORT_VERSION: 1.212

jobs:
  build:
    name: Build MSP430 Firmware
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache MSP430-GCC compiler
        id: cache-gcc
        uses: actions/cache@v4
        with:
          path: ~/msp430-gcc
          key: msp430-gcc-${{ env.MSP430_GCC_VERSION }}

      - name: Install MSP430-GCC compiler
        if: steps.cache-gcc.outputs.cache-hit != 'true'
        run: |
          wget -q https://dr.ti.com/dl/software/MSP-Tools/MSP430GCC/msp430-gcc-${{ env.MSP430_GCC_VERSION }}_linux64.tar.bz2
          mkdir -p ~/msp430-gcc
          tar -xf msp430-gcc-${{ env.MSP430_GCC_VERSION }}_linux64.tar.bz2 --strip-components=1 -C ~/msp430-gcc

      - name: Cache MSP430-GCC support files
        id: cache-support
        uses: actions/cache@v4
        with:
          path: ~/msp430-gcc-support-files
          key: msp430-gcc-support-files-${{ env.MSP430_SUPPORT_VERSION }}

      - name: Install MSP430-GCC support files
        if: steps.cache-support.outputs.cache-hit != 'true'
        run: |
          wget -q https://dr.ti.com/dl/software/MSP-Tools/MSP430GCC/msp430-gcc-support-files-${{ env.MSP430_SUPPORT_VERSION }}.zip
          unzip -q msp430-gcc-support-files-${{ env.MSP430_SUPPORT_VERSION }}.zip -d ~

      - name: Add toolchain to PATH
        run: echo "$HOME/msp430-gcc/bin" >> $GITHUB_PATH

      - name: Build firmware
        run: make -C sfw-00082/gcc SUPPORT_FILE_DIR=$HOME/msp430-gcc-support-files/include

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            sfw-00082/gcc/gcc-build/sfw-00082.elf
            sfw-00082/gcc/gcc-build/sfw-00082.hex
