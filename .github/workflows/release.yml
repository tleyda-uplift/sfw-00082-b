name: Test App Release

on:
  push:
    tags: ["Test_App_v*.*.*.*"]
  workflow_dispatch:

jobs:
  release:
    name: Build & Upload Artifact
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore
        working-directory: HID-Test-App

      - name: Publish
        run: >
          dotnet publish HID-Test-App/HID-Test-App.csproj
          -c Release
          -r win-x64
          --output "${{ github.workspace }}\publish"
        working-directory: HID-Test-App

      - name: Rename artifact
        run: |
          Rename-Item -Path "${{ github.workspace }}\publish\HID-Test-App.exe" `
                      -NewName "HID-Test-App-${{ github.ref_name }}.exe"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HID-Test-App-${{ github.ref_name }}
          path: publish/HID-Test-App-${{ github.ref_name }}.exe
