name: Test App CI / Release

on:
  push:
    branches: ["**"]
    tags: ["Test_App_v*.*.*.*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore
        working-directory: HID-Test-App

      - name: Test
        run: dotnet test Hid-Test-App-Tests/Hid-Test-App-Tests.csproj --no-restore --verbosity normal
        working-directory: HID-Test-App

  release:
    name: Build & Publish Release
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/Test_App_v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore
        working-directory: HID-Test-App

      - name: Publish
        run: >
          dotnet publish HID-Test-App/HID-Test-App.csproj
          -c Release
          -r win-x64
          --output "${{ github.workspace }}\publish"
        working-directory: HID-Test-App

      - name: Rename artifact
        run: |
          Rename-Item -Path "${{ github.workspace }}\publish\HID-Test-App.exe" `
                      -NewName "HID-Test-App-${{ github.ref_name }}.exe"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/HID-Test-App-${{ github.ref_name }}.exe
          generate_release_notes: true
